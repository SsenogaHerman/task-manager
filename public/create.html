<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <main class="page-shell">
        <section class="create-layout">
            <aside class="info-card">
                <div class="mini-badge">
                    <span class="icon-circle soft-teal">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M11.25 5a.75.75 0 0 1 1.5 0v6.25H19a.75.75 0 0 1 0 1.5h-6.25V19a.75.75 0 0 1-1.5 0v-6.25H5a.75.75 0 0 1 0-1.5h6.25V5Z"></path>
                        </svg>
                    </span>
                    <span>Create Space</span>
                </div>

                <div class="info-copy">
                    <p class="eyebrow">New Task</p>
                    <h1>Add a fresh task </h1>
                    
                </div>

                
            </aside>

            <section class="create-card">
                <div class="create-header">
                    <p class="eyebrow">Create Task</p>
                    <h1>What do you need to get done?</h1>
                    <p>Write a concise task and submit it to your board.</p>
                </div>

                <form action="/add" method="POST" class="task-form">
                    <div>
                        <label for="task" class="field-label">Task name</label>
                        <input
                            id="task"
                            type="text"
                            name="tasks"
                            placeholder="Example: Finish dashboard redesign"
                            required
                        >
                    </div>

                    <button type="submit" class="primary-link">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M11.25 5a.75.75 0 0 1 1.5 0v6.25H19a.75.75 0 0 1 0 1.5h-6.25V19a.75.75 0 0 1-1.5 0v-6.25H5a.75.75 0 0 1 0-1.5h6.25V5Z"></path>
                        </svg>
                        <span>Add Task</span>
                    </button>
                </form>

                <div class="create-actions">
                    <a href="/" class="ghost-link">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M10.78 18.53a.75.75 0 0 1-1.06 0l-5-5a.75.75 0 0 1 0-1.06l5-5a.75.75 0 1 1 1.06 1.06L7.06 12l3.72 3.72a.75.75 0 0 1 0 1.06Zm3.5 0a.75.75 0 0 1-1.06-1.06L16.94 12l-3.72-3.72a.75.75 0 1 1 1.06-1.06l5 5a.75.75 0 0 1 0 1.06l-5 5Z"></path>
                        </svg>
                        <span>Back to Home</span>
                    </a>
                </div>
            </section>
        </section>
    </main>
</body>
</html>
